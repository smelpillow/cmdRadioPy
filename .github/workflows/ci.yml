name: CI

on:
  push:
    branches:
      - main
      - Testing
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project with UI extras
        run: python -m pip install .[ui]

      - name: Import top-level modules
        run: python -c "import main, player, m3u_parser, version; print(version.APP_VERSION)"

      - name: Compile Python modules
        run: python -m py_compile main.py player.py m3u_parser.py version.py

      - name: Smoke test CLI version
        run: python main.py --version